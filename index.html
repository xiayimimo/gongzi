    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background-color: #e8f5e8;
            padding: 20px;
        }
        
        .container {
            max-width: 1500px;
            margin: 0 auto;
            background-color: #e8f5e8;
            padding: 20px;
            border-radius: 0;
            box-shadow: none;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
            font-size: 24px;
            font-weight: bold;
        }
        
        .controls {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        button {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background-color 0.3s;
            font-weight: bold;
        }
        
        button:hover {
            background-color: #45a049;
        }
        
        button:active {
            background-color: #3e8e41;
        }
        
        .export-btn {
            background-color: #2196F3;
        }
        
        .export-btn:hover {
            background-color: #0b7dda;
        }
        
        .add-btn {
            background-color: #4CAF50;
        }
        
        .add-btn:hover {
            background-color: #45a049;
        }
        
        .remove-btn {
            background-color: #f44336;
        }
        
        .remove-btn:hover {
            background-color: #da190b;
        }
        
        .save-btn {
            background-color: #ff9800;
        }
        
        .save-btn:hover {
            background-color: #f57c00;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
            table-layout: fixed;
        }
        
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: center;
            word-wrap: break-word;
            white-space: normal;
            min-width: 80px;
        }
        
        .container {
            overflow-x: auto;
        }
        
        input, select {
            width: 100%;
            padding: 5px;
            border: 1px solid #ddd;
            border-radius: 4px;
            text-align: center;
            background-color: white;
            color: #333;
            font-size: 14px;
            box-sizing: border-box;
        }
        
        .remark input {
            text-align: left;
            min-height: 60px;
            resize: vertical;
        }
        
        th {
            background-color: #4CAF50;
            color: white;
            font-weight: bold;
        }
        
        tr:nth-child(even) {
            background-color: #f2f2f2;
        }
        
        tr:hover {
            background-color: #e8f5e8;
        }
        
        select {
            height: 30px;
            width: 100%;
            padding: 5px;
            border: 1px solid #ddd;
            border-radius: 4px;
            text-align: center;
            background-color: white;
            color: #333;
            font-size: 14px;
            box-sizing: border-box;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #4CAF50;
            box-shadow: 0 0 0 2px rgba(76, 175, 80, 0.2);
        }
        
        .calculated {
            background-color: #e8f5e8;
            font-weight: bold;
        }
        
        .footer {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #ddd;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
        
        .footer-item {
            text-align: center;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 10px;
                overflow-x: auto;
            }
            
            table {
                font-size: 12px;
                min-width: 1000px;
            }
            
            th, td {
                padding: 4px;
                word-wrap: break-word;
                white-space: normal;
            }
            
            .footer {
                grid-template-columns: 1fr;
                gap: 10px;
            }
            
            .title-section {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .date-section {
                width: 100%;
            }
            
            .custom-date-picker {
                width: 100%;
                justify-content: flex-start;
            }
            
            .date-select {
                max-width: none;
                flex: 1;
            }
        }
    </style>
</head>

    <script>
        // 初始化页面
        document.addEventListener('DOMContentLoaded', function() {
            // 加载预设数据
            generateSalaryTable();
            
            // 计算所有行的工资
            calculateAllRows();
            
            // 添加事件监听器
            addEventListeners();
            

            
            // 导出Excel按钮
            document.getElementById('export-btn').addEventListener('click', function() {
                exportToExcel();
            });
            
            // 添加员工按钮
            document.getElementById('add-employee').addEventListener('click', function(e) {
                e.preventDefault();
                try {
                    addEmployee();
                    console.log('添加员工成功');
                } catch (error) {
                    console.error('添加员工失败:', error);
                }
            });

        // 为现有行添加复选框
        function addCheckboxesToExistingRows() {
            const rows = document.querySelectorAll('#salary-table tbody tr');
            rows.forEach(row => {

        function initSelectAll() {
            const selectAll = document.getElementById('select-all');
            if (selectAll) {

        // 计算单行工资
        function calculateRow(row) {
            const basic = parseFloat(row.querySelector('.basic').value) || 0;
            const fullAttendance = parseFloat(row.querySelector('.full-attendance').value) || 0;
            const overtime = parseFloat(row.querySelector('.overtime').value) || 0;
            const performance = parseFloat(row.querySelector('.performance').value) || 0;
            const other = parseFloat(row.querySelector('.other').value) || 0;
            const socialSecurity = parseFloat(row.querySelector('.social-security').value) || 0;
            const noPunch = parseFloat(row.querySelector('.no-punch').value) || 0;
            const fine = parseFloat(row.querySelector('.fine').value) || 0;
            
            // 计算应发工资
            const gross = basic + fullAttendance + overtime + performance + other;
            
            // 计算实发工资
            const net = gross - socialSecurity - noPunch - fine;
            
            // 更新计算结果
            row.querySelector('.gross').value = gross.toFixed(2);
            row.querySelector('.net').value = net.toFixed(2);
        }
        
        // 计算所有行的工资
        function calculateAllRows() {
            const rows = document.querySelectorAll('#salary-table tbody tr');
            rows.forEach(row => {
                calculateRow(row);
            });
        }
        
        // 添加事件监听器
        function addEventListeners() {
            const inputs = document.querySelectorAll('#salary-table input, #salary-table select');
            inputs.forEach(input => {
                // 跳过只读输入框
                if (input.readOnly) return;
                
                // 跳过复选框，避免勾选时触发filterEmptyRows
                if (input.type === 'checkbox') return;
                
                if (input.tagName === 'SELECT') {
                    input.addEventListener('change', function() {
                        const row = this.closest('tr');
                        calculateRow(row);
                        filterEmptyRows();
                    });
                } else {
                    input.addEventListener('input', function() {
                        const row = this.closest('tr');
                        calculateRow(row);
                        filterEmptyRows();
                    });
                }
            });
        }

            try {

                const presetData = [];
                
                rows.forEach(row => {
                    const name = row.querySelector('.name').value.trim();

                    const position = row.querySelector('.position').value;
                    
                    // 只保存姓名不为空的行数据
                    if (name) {
                        const employeeData = {
                            name: name,

                            position: position,
                            basic: parseFloat(row.querySelector('.basic').value) || 0,
                            fullAttendance: parseFloat(row.querySelector('.full-attendance').value) || 0,
                            overtime: parseFloat(row.querySelector('.overtime').value) || 0,

                            other: parseFloat(row.querySelector('.other').value) || 0,

                } finally {
                    hideLoading();
                }
            }, 500);

        // 显示消息
        function showMessage(message, type = 'info') {
            // 创建消息元素
            const messageElement = document.createElement('div');
            messageElement.className = `message ${type}`;
            messageElement.textContent = message;
            
            // 设置消息样式
            messageElement.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                padding: 15px 20px;
                border-radius: 4px;
                color: white;
                font-weight: bold;
                z-index: 1000;
                animation: slideIn 0.3s ease-out;
            `;
            
            // 根据类型设置背景颜色
            switch (type) {
                case 'success':
                    messageElement.style.backgroundColor = '#4CAF50';
                    break;
                case 'error':
                    messageElement.style.backgroundColor = '#f44336';
                    break;
                case 'warning':
                    messageElement.style.backgroundColor = '#ff9800';
                    break;
                default:
                    messageElement.style.backgroundColor = '#2196F3';
            }
            
            // 添加动画
            const style = document.createElement('style');
            style.textContent = `
                @keyframes slideIn {
                    from {
                        transform: translateX(100%);
                        opacity: 0;
                    }
                    to {
                        transform: translateX(0);
                        opacity: 1;
                    }
                }
            `;
            document.head.appendChild(style);
            
            // 添加到页面
            document.body.appendChild(messageElement);
            
            // 3秒后移除
            setTimeout(() => {
                messageElement.style.animation = 'slideIn 0.3s ease-out reverse';
                setTimeout(() => {
                    if (messageElement.parentNode) {
                        messageElement.parentNode.removeChild(messageElement);
                    }
                    if (style.parentNode) {
                        style.parentNode.removeChild(style);
                    }
                }, 300);
            }, 3000);
        }

                // 创建工作表
                const worksheet = workbook.addWorksheet(`${year}年${month}月工资表`);
                
                // 设置默认行高
                worksheet.properties.defaultRowHeight = 20;
                
                // 添加表格标题
                const titleRow = worksheet.addRow([title]);
                titleRow.font = { bold: true, size: 16, name: '微软雅黑' };
                titleRow.alignment = { horizontal: 'center', vertical: 'middle' };
                titleRow.height = 30;
                worksheet.mergeCells(titleRow.number, 1, titleRow.number, 16);
                
                // 手动添加表头
                const headerRow = worksheet.addRow(['序号', '姓名', '部门', '职位', '基本工资', '全勤奖', '加班补贴', '业绩超额奖', '其他补助', '应发工资', '社保扣款', '未打卡扣款', '罚款', '实发工资', '领取人', '备注']);
                headerRow.font = { bold: true, color: { argb: 'FFFFFF' }, name: '微软雅黑' };
                headerRow.fill = {
                    type: 'pattern',
                    pattern: 'solid',
                    fgColor: { argb: '003366' } // 深蓝色背景
                };
                headerRow.alignment = { horizontal: 'center', vertical: 'middle' };
                headerRow.height = 25;
                
                // 设置表头边框
                for (let i = 1; i <= 16; i++) {
                    const cell = headerRow.getCell(i);
                    cell.border = {
                        top: { style: 'thin' },
                        left: { style: 'thin' },
                        bottom: { style: 'thin' },
                        right: { style: 'thin' }
                    };
                }
                
                // 设置列宽
                worksheet.columns = [
                    { width: 8 },   // 序号
                    { width: 10 },  // 姓名
                    { width: 10 },  // 部门
                    { width: 10 },  // 职位
                    { width: 12 },  // 基本工资
                    { width: 10 },  // 全勤奖
                    { width: 10 },  // 加班补贴
                    { width: 12 },  // 业绩超额奖
                    { width: 10 },  // 其他补助
                    { width: 12 },  // 应发工资
                    { width: 12 },  // 社保扣款
                    { width: 12 },  // 未打卡扣款
                    { width: 8 },   // 罚款
                    { width: 12 },  // 实发工资
                    { width: 10 },  // 领取人
                    { width: 15 }   // 备注
                ];
                
                showExportProgress('填充数据...');
                
                // 填充数据
                const rows = document.querySelectorAll('#salary-table tbody tr');
                let dataRowCount = 0;
                
                rows.forEach((row, index) => {
                    const name = row.querySelector('.name').value.trim();
                    const department = row.querySelector('.department').value.trim();
                    const position = row.querySelector('.position').value.trim();
                    const basic = row.querySelector('.basic').value.trim();
                    
                    // 只导出有数据的行
                    if (name || department || position || basic) {
                        dataRowCount++;
                        
                        // 计算应发工资和实发工资
                        const gross = parseFloat(row.querySelector('.gross').value) || 0;
                        const net = parseFloat(row.querySelector('.net').value) || 0;
                        
                        const excelRow = worksheet.addRow([
                            dataRowCount,
                            row.querySelector('.name').value,
                            row.querySelector('.department').value,
                            row.querySelector('.position').value,
                            parseFloat(row.querySelector('.basic').value) || 0,
                            parseFloat(row.querySelector('.full-attendance').value) || 0,
                            parseFloat(row.querySelector('.overtime').value) || 0,
                            parseFloat(row.querySelector('.performance').value) || 0,
                            parseFloat(row.querySelector('.other').value) || 0,
                            gross,
                            parseFloat(row.querySelector('.social-security').value) || 0,
                            parseFloat(row.querySelector('.no-punch').value) || 0,
                            parseFloat(row.querySelector('.fine').value) || 0,
                            net,
                            row.querySelector('.recipient').value,
                            row.querySelector('.remark').value
                        ]);
                        
                        // 设置单元格样式
                        excelRow.alignment = { horizontal: 'center', vertical: 'middle' };
                        
                        // 设置边框
                        for (let i = 1; i <= 16; i++) {
                            const cell = excelRow.getCell(i);
                            cell.border = {
                                top: { style: 'thin' },
                                left: { style: 'thin' },
                                bottom: { style: 'thin' },
                                right: { style: 'thin' }
                            };
                        }
                        
                        // 为第五行添加特殊背景色
                        if (dataRowCount === 5) {
                            for (let i = 1; i <= 16; i++) {
                                const cell = excelRow.getCell(i);
                                cell.fill = {
                                    type: 'pattern',
                                    pattern: 'solid',
                                    fgColor: { argb: 'D4EDDA' }
                                };
                            }
                        }
                    }
                });
                
                // 添加空行
                const emptyRow = worksheet.addRow(new Array(16).fill(''));
                for (let i = 1; i <= 16; i++) {
                    const cell = emptyRow.getCell(i);
                    cell.border = {
                        top: { style: 'thin' },
                        left: { style: 'thin' },
                        bottom: { style: 'thin' },
                        right: { style: 'thin' }
                    };
                }
                
                showExportProgress('添加页脚信息...');
                
                // 添加页脚
                const footerRow1 = worksheet.addRow(['制表人：', footerData.maker, '', '', '', '财务部：', footerData.finance, '', '', '', '经理：', footerData.manager, '', '', '', '']);
                const footerRow2 = worksheet.addRow(['制表时间：', footerData.makeDate, '', '', '', '签字及盖章：', footerData.financeStamp, '', '', '', '签字及盖章：', footerData.managerStamp, '', '', '', '']);
                
                // 设置页脚样式
                for (let i = 1; i <= 2; i++) {
                    const row = i === 1 ? footerRow1 : footerRow2;
                    row.alignment = { horizontal: 'center', vertical: 'middle' };
                    for (let j = 1; j <= 16; j++) {
                        const cell = row.getCell(j);
                        cell.border = {
                            top: { style: 'thin' },
                            left: { style: 'thin' },
                            bottom: { style: 'thin' },
                            right: { style: 'thin' }
                        };
                    }
                }
                
                // 合并页脚单元格，确保与表格总宽度对齐
                // 第一行：制表人、财务部、经理
                worksheet.mergeCells(footerRow1.number, 1, footerRow1.number, 5);
                worksheet.mergeCells(footerRow1.number, 6, footerRow1.number, 10);
                worksheet.mergeCells(footerRow1.number, 11, footerRow1.number, 16);
                
                // 第二行：制表时间、财务部签字、经理签字
                worksheet.mergeCells(footerRow2.number, 1, footerRow2.number, 5);
                worksheet.mergeCells(footerRow2.number, 6, footerRow2.number, 10);
                worksheet.mergeCells(footerRow2.number, 11, footerRow2.number, 16);
                
                showExportProgress('生成Excel文件...');
                
                // 生成Excel文件
                const buffer = await workbook.xlsx.writeBuffer();
                const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
                saveAs(blob, `${year}年${month}月工资表.xlsx`);
                
                hideExportProgress();
                
            } catch (error) {
                console.error('导出Excel失败:', error);
                hideExportProgress();
                showMessage('导出Excel失败，请稍后重试', 'error');
            }
        }
        

    </script>
</body>
</html>
